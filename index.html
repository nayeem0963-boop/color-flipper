<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Flipper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: background 0.5s ease-in-out;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 60px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .color-preview {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 3px solid white;
        }

        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 2px 10px rgba(245, 87, 108, 0.4);
        }

        .color-display-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .color-code {
            background: white;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            font-family: 'Courier New', monospace;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(79, 172, 254, 0.6);
        }

        .copy-btn:active {
            transform: translateY(0px);
            box-shadow: 0 2px 8px rgba(79, 172, 254, 0.4);
        }

        .copy-btn.copied {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .info {
            color: white;
            margin-top: 25px;
            font-size: 0.9rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .keyboard-hint {
            color: rgba(255, 255, 255, 0.8);
            margin-top: 15px;
            font-size: 0.8rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Color Flipper</h1>
        <div class="color-preview" id="colorPreview"></div>
        <button onclick="changeColor()">Change Color</button>
        <div class="color-display-wrapper">
            <div class="color-code" id="colorCode">#667EEA</div>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">Copy</button>
        </div>
        <p class="info">Click the button to flip to a random color</p>
        <p class="keyboard-hint">⌨️ Press Spacebar for quick color change</p>
    </div>

    <script>
        // Array of 10 beautiful hex colors
        const colors = [
            '#667eea', // Indigo
            '#764ba2', // Purple
            '#f093fb', // Pink
            '#4facfe', // Blue
            '#00f2fe', // Cyan
            '#43e97b', // Green
            '#fa709a', // Coral
            '#feca57', // Yellow
            '#ff9a56', // Orange
            '#a8edea'  // Mint
        ];

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function changeColor() {
            const randomColor = getRandomColor();
            document.body.style.background = randomColor;
            document.getElementById('colorPreview').style.background = randomColor;
            document.getElementById('colorCode').textContent = randomColor.toUpperCase();
            resetCopyButton();
        }

        function copyToClipboard() {
            const colorCode = document.getElementById('colorCode').textContent;
            navigator.clipboard.writeText(colorCode).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.classList.add('copied');
                copyBtn.textContent = 'Copied!';
                
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.textContent = 'Copy';
                }, 2000);
            }).catch(() => {
                alert('Failed to copy color code');
            });
        }

        function resetCopyButton() {
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.classList.remove('copied');
            copyBtn.textContent = 'Copy';
        }

        // Initialize with the starting color
        document.getElementById('colorPreview').style.background = '#667eea';

        // Keyboard shortcuts: Spacebar, Enter to change color
        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                event.preventDefault(); // Prevent default spacebar behavior (scrolling)
                changeColor();
            } else if (event.key === 'Enter') {
                changeColor();
            }
        });
    </script>
</body>
</html>
