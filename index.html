<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Flipper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: background 0.5s ease-in-out;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 60px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .color-display {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-family: 'Courier New', monospace;
        }

        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 2px 10px rgba(245, 87, 108, 0.4);
        }

        .info {
            color: white;
            margin-top: 30px;
            font-size: 0.9rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Color Flipper</h1>
        <div class="color-display" id="colorDisplay">#667EEA</div>
        <button onclick="changeColor()">Change Color</button>
        <p class="info">Click the button to flip to a random color</p>
    </div>

    <script>
        // Array of 10 beautiful hex colors
        const colors = [
            '#667eea', // Indigo
            '#764ba2', // Purple
            '#f093fb', // Pink
            '#4facfe', // Blue
            '#00f2fe', // Cyan
            '#43e97b', // Green
            '#fa709a', // Coral
            '#feca57', // Yellow
            '#ff9a56', // Orange
            '#a8edea'  // Mint
        ];

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function changeColor() {
            const randomColor = getRandomColor();
            document.body.style.background = randomColor;
            document.getElementById('colorDisplay').textContent = randomColor;
        }

        // Optional: Allow users to press Enter or Space to change color
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                changeColor();
            }
        });
    </script>
</body>
</html>
